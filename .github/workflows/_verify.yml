name: Verify (Reusable)

on:
  workflow_call:

jobs:
  verify:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install swift-format
        run: brew install swift-format

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test
