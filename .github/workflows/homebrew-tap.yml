name: Update Homebrew tap

on:
  release:
    types: [published]

jobs:
  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update Homebrew tap
        uses: dayflower/brew-up@e248724cf8f143f257d45077dabfee733f338f06 # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release-tag: ${{ github.ref_name }}
          template-path: homebrew/pbshow.rb.tmpl
          output-path: Formula/pbshow.rb
          asset-map: |
            default=pbshow-{{version}}-macos.zip
          target-repo: dayflower/homebrew-tap
          target-branch: main
          target-repo-token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          publish-mode: pr-auto-merge
          auto-merge-method: squash
