name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml

  detect-version-change:
    runs-on: macos-15
    outputs:
      version_changed: ${{ steps.changed.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect VERSION changes
        id: changed
        run: |
          set -euo pipefail
          if git diff --name-only HEAD^ HEAD | grep -Fxq 'VERSION'; then
            echo 'version_changed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'version_changed=false' >> "$GITHUB_OUTPUT"
          fi

  release:
    if: needs.detect-version-change.outputs.version_changed == 'true'
    needs:
      - verify
      - detect-version-change
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Verify version consistency
        run: ./scripts/version.sh assert-consistent

      - name: Resolve release version
        id: release_meta
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          tag="v${version}"
          archive="pbshow-${version}-macos.zip"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.tag }}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag already exists: ${tag}" >&2
            exit 1
          fi

      - name: Create and push tag
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.tag }}"
          git tag "${tag}"
          git push origin "${tag}"

      - name: Build release binary
        run: swift build -c release

      - name: Archive release binary
        run: |
          set -euo pipefail
          archive="${{ steps.release_meta.outputs.archive }}"
          rm -f "${archive}"
          zip -j "${archive}" .build/release/pbshow

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.tag }}"
          archive="${{ steps.release_meta.outputs.archive }}"
          gh release create "${tag}" "${archive}" \
            --title "${tag}" \
            --notes "Release ${tag}" \
            --latest
