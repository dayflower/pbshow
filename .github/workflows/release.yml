name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml

  detect-version-change:
    runs-on: macos-15
    outputs:
      version_changed: ${{ steps.changed.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect VERSION changes
        id: changed
        run: |
          set -euo pipefail
          if git diff --name-only HEAD^ HEAD | grep -Fxq 'VERSION'; then
            echo 'version_changed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'version_changed=false' >> "$GITHUB_OUTPUT"
          fi

  release:
    if: needs.detect-version-change.outputs.version_changed == 'true'
    needs:
      - verify
      - detect-version-change
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: "6.2"

      - name: Verify version consistency
        run: ./scripts/version.sh assert-consistent

      - name: Resolve release version
        id: release_meta
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          tag="v${version}"
          archive="pbshow-${version}-macos.zip"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.tag }}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag already exists: ${tag}" >&2
            exit 1
          fi

      - name: Create and push tag
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.tag }}"
          git tag "${tag}"
          git push origin "${tag}"

      - name: Build release binary
        run: swift build -c release

      - name: Archive release binary
        run: |
          set -euo pipefail
          archive="${{ steps.release_meta.outputs.archive }}"
          rm -f "${archive}"
          zip -j "${archive}" .build/release/pbshow

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.ACTIONS_APP_ID }}
          private-key: ${{ secrets.ACTIONS_APP_PRIVATE_KEY }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.app_token.outputs.token }}
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.release_meta.outputs.archive }}
